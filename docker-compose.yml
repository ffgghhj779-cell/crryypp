services:
  ewa-engine:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: ewa-engine
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - EWA_SERVICE_KEY=${EWA_SERVICE_KEY:-dev-internal-key}
      - EWA_PORT=8001
      - NODE_ENV=${NODE_ENV:-development}
      - EWA_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s